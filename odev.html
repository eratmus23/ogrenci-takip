<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödev Teslim Sistemi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="mainContainer" class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Ödev Teslim Paneli</h2>
            <p id="kapanisUyarisi" class="text-xs text-red-500 font-semibold mt-1">Sistem bu gece 00:00'da kapanacaktır.</p>
        </div>

        <form id="odevForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Ödev Kodu</label>
                    <input type="text" id="odevKod" required class="w-full p-2 bg-white border rounded-lg text-sm font-mono text-center uppercase" placeholder="Örn: 11A-LOG">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Sınıf</label>
                    <input type="text" id="sinifAd" required class="w-full p-2 bg-white border rounded-lg text-sm text-center uppercase" placeholder="Örn: 11-A">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Adınız Soyadınız</label>
                <input type="text" id="ogrenciAd" placeholder="Örn: Kaan Atalay" required class="w-full p-2.5 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="grid grid-cols-4 gap-2">
                <div>
                    <label class="block text-center text-xs font-bold text-gray-500">Soru</label>
                    <input type="number" id="soruSayisi" min="0" required class="w-full p-2 border rounded-lg text-center text-sm">
                </div>
                <div>
                    <label class="block text-center text-xs font-bold text-green-600">Doğru</label>
                    <input type="number" id="dogruSayisi" min="0" required class="w-full p-2 border rounded-lg text-center text-sm text-green-600 font-bold">
                </div>
                <div>
                    <label class="block text-center text-xs font-bold text-red-600">Yanlış</label>
                    <input type="number" id="yanlisSayisi" min="0" required class="w-full p-2 border rounded-lg text-center text-sm text-red-600 font-bold">
                </div>
                <div>
                    <label class="block text-center text-xs font-bold text-gray-600">Boş</label>
                    <input type="number" id="bosSayisi" min="0" required class="w-full p-2 border rounded-lg text-center text-sm">
                </div>
            </div>

            <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center bg-gray-50">
                <label class="cursor-pointer block">
                    <span class="text-sm text-blue-600 font-semibold block mb-1">📸 Ödev Sayfalarını Çek / Yükle</span>
                    <span class="text-xs text-gray-400 block mb-2">(Maksimum 3 Sayfa)</span>
                    <input type="file" id="fotoGiris" accept="image/*" multiple class="hidden">
                </label>
                <div id="onizlemeKutusu" class="flex justify-center gap-2 mt-2"></div>
            </div>

            <button type="submit" id="gonderButon" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm shadow-md transition-all">
                Ödevi Teslim Et
            </button>
        </form>
    </div>

    <script>
        let yuklenecekDosyalar = [];

        const urlParams = new URLSearchParams(window.location.search);
        const urlKod = urlParams.get('kod') || "";
        if(urlKod) {
            document.getElementById('odevKod').value = urlKod;
            document.getElementById('sinifAd').value = urlKod.split('-')[0] || "";
        }

        async function zamanKontrol() {
            try {
                const response = await fetch('https://worldtimeapi.org/api/timezone/Europe/Istanbul');
                const data = await response.json();
                const simdi = new Date(data.datetime);
                if (simdi.getHours() === 0 && simdi.getMinutes() === 0) {
                    document.getElementById('mainContainer').innerHTML = `
                        <div class="text-center p-6"><h2 class="text-xl font-bold text-red-600">Süre Doldu!</h2></div>`;
                }
            } catch (e) {
                const yerelSaat = new Date();
                if(yerelSaat.getHours() === 0) location.reload();
            }
        }
        setInterval(zamanKontrol, 30000);
        zamanKontrol();

        document.getElementById('fotoGiris').addEventListener('change', function(e) {
            const dosyalar = Array.from(e.target.files).slice(0, 3);
            const onizleme = document.getElementById('onizlemeKutusu');
            onizleme.innerHTML = "";
            yuklenecekDosyalar = dosyalar; // Orijinal dosyaları sakla (Yükleme anında sıkıştıracağız)

            dosyalar.forEach((dosya) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const miniImg = document.createElement('img');
                    miniImg.src = event.target.result;
                    miniImg.className = "w-16 h-16 object-cover rounded border";
                    onizleme.appendChild(miniImg);
                };
                reader.readAsDataURL(dosya);
            });
        });

        // Ücretsiz Anonim Resim Sunucusuna Yükleme Fonksiyonu
        async function resmiBulutaYukle(dosya) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = async function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1000;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // JPEG olarak %60 kalitede sıkıştırıyoruz (Dosya boyutu iyice düşsün)
                        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.6));
                        
                        const formData = new FormData();
                        formData.append('image', blob, 'odev.jpg');

                        try {
                            // Ücretsiz ImgBB API veya Anonim Resim Servisi Entegrasyonu
                            // Testlerin hızlı çalışması için anonim bir geçici imaj hostu kullanıyoruz
                            const response = await fetch('https://api.imgbb.com/1/upload?key=6f103cc1054320956b9c9f28c2e6478d', {
                                method: 'POST',
                                body: formData
                            });
                            const json = await response.json();
                            resolve(json.data.url); // Resmin internet linkini dön
                        } catch (error) {
                            resolve("https://via.placeholder.com/800x1000.png?text=Resim+Yuklenemedi");
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(dosya);
            });
        }

        document.getElementById('odevForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const gonderButon = document.getElementById('gonderButon');
            gonderButon.disabled = true;
            gonderButon.innerText = "Fotoğraflar Buluta Yükleniyor...";

            let yuklenenLinkler = [];
            
            // Fotoğrafları sırayla buluta yükle ve linklerini al
            for (let i = 0; i < yuklenecekDosyalar.length; i++) {
                gonderButon.innerText = `Fotoğraf Yükleniyor (${i+1}/${yuklenecekDosyalar.length})...`;
                const link = await resmiBulutaYukle(yuklenecekDosyalar[i]);
                yuklenenLinkler.push({
                    sayfa: i + 1,
                    veri: link, // Artık devasa base64 kodu değil, minik web linki gidiyor!
                    cihaz: navigator.userAgent.includes("iPhone") ? "iOS" : "Android/PC",
                    cekilerSaat: new Date().toLocaleTimeString('tr-TR'),
                    dosyaBoyutu: "Bulut Adresi"
                });
            }

            gonderButon.innerText = "Veriler Panoya Fırlatılıyor...";

            const odevPaketi = {
                id: Math.random().toString(36).substr(2, 9),
                odevKod: document.getElementById('odevKod').value.trim().toUpperCase(),
                sinifAd: document.getElementById('sinifAd').value.trim().toUpperCase(),
                ogrenciAd: document.getElementById('ogrenciAd').value.trim(),
                soru: document.getElementById('soruSayisi').value,
                dogru: document.getElementById('dogruSayisi').value,
                yanlis: document.getElementById('yanlisSayisi').value,
                bos: document.getElementById('bosSayisi').value,
                fotograflar: yuklenenLinkler,
                gonderimZamani: new Date().toLocaleTimeString('tr-TR')
            };

            const client = mqtt.connect('wss://broker.hivemq.com:8000/mqtt');
            const kanal = "k_eregli/mat_takip/" + odevPaketi.odevKod;

            client.on('connect', function () {
                client.publish(kanal, JSON.stringify(odevPaketi), { qos: 1 }, function() {
                    client.end();
                    document.getElementById('mainContainer').innerHTML = `
                        <div class="text-center p-6">
                            <h2 class="text-2xl font-bold text-green-600">🎉 Başarılı!</h2>
                            <p class="text-sm text-gray-600 mt-2">Ödeviniz başarıyla sisteme teslim edilmiştir. İyi çalışmalar dileriz.</p>
                        </div>`;
                });
            });
        });
    </script>
</body>
</html>
